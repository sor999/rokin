version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: robot_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-telemetry}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - robot_net
    restart: always

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.3
    container_name: robot_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - robot_net

  kafka:
    image: confluentinc/cp-kafka:7.4.3
    container_name: robot_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - robot_net

  fake_robot:
    build:
      context: ../ros
    container_name: robot_fake_nodes
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - ROS_DOMAIN_ID=0
      # ROS_LOCALHOST_ONLY 해제: 브릿지 노드와 동일 컨테이너 내 DDS 통신
    # fake_robot 3대 + ros_kafka_bridge를 함께 기동하는 통합 launch 파일 사용
    command: ["ros2", "launch", "ros_kafka_bridge", "full_demo.launch.py"]
    networks:
      - robot_net

networks:
  robot_net:
    driver: bridge

volumes:
  postgres_data:
